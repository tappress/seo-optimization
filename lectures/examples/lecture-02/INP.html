<script>
    // Web Worker для важких обчислень
    const worker = new Worker('calculation-worker.js')

    document.querySelector('button').addEventListener('click', () => {
        // Швидка візуальна відповідь
        button.classList.add('loading') // Миттєво!
        button.disabled = true

        // Важка робота в Worker
        worker.postMessage({action: 'calculate'})
    })

    worker.onmessage = (e) => {
        updateUI(e.data)
        button.classList.remove('loading')
        button.disabled = false
    }

    // Code splitting
    import('lodash/debounce').then(({default: debounce}) => {
        // Завантажуємо тільки debounce, а не всю бібліотеку
    })

    // Debounce для inputs
    const handleSearch = debounce((query) => {
        searchAPI(query)
    }, 300)

    input.addEventListener('input', (e) => {
        // Миттєве візуальне оновлення
        showLoader() //
        handleSearch(e.target.value)
    })
</script>
