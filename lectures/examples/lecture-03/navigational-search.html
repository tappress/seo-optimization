<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!-- Title оптимізований під brand -->
    <title>TechStore - Інтернет-магазин електроніки №1 в Україні</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
</head>
<body>
<!-- Домашня сторінка + Brand Schema -->
<script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TechStore Ukraine",
        "url": "https://techstore.ua",
        "logo": "https://techstore.ua/logo.png",
        "sameAs": [
            "https://facebook.com/techstore",
            "https://instagram.com/techstore"
        ],
        "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+380-44-123-4567",
            "contactType": "Customer Service"
        }
    }
</script>
</body>
</html>
