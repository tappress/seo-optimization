<body>
<!-- ПРАВИЛЬНА структура сторінки товару -->
<h1>Apple MacBook Pro M3 14" - Space Gray</h1>
<h2>Характеристики</h2>
<h3>Процесор</h3>
<h3>Дисплей</h3>
<h3>Автономність</h3>
<h2>Відгуки покупців</h2>
<h3>Переваги</h3>
<h3>Недоліки</h3>
<h2>Схожі товари</h2>

<!-- ТИПОВІ ПОМИЛКИ -->

<!-- 1. Пропуск рівнів -->
<h1>Заголовок сторінки</h1>
<h3>Підрозділ</h3>  <!-- Де h2?! -->

<!-- 2. Декілька H1 -->
<h1>Назва товару</h1>
<h1>Акція!</h1>  <!-- Тільки один H1 на сторінку -->

<!-- 3. "Заголовок" через CSS -->
<p class="big-title">Це не заголовок для Google</p>

<!-- 4. Декоративні заголовки без ключових слів -->
<h2>Ще трохи про нас...</h2>
