<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <rect x="80" y="120" width="190" height="150" rx="12" fill="#dbeafe" stroke="#638ac8" stroke-width="3"/>
  <text x="175" y="185" text-anchor="middle" font-size="24" font-family="Arial" fill="#1e3a6a">1. Audit</text>
  <text x="175" y="220" text-anchor="middle" font-size="19" font-family="Arial" fill="#1e3a6a">збір backlink data</text>

  <rect x="300" y="120" width="190" height="150" rx="12" fill="#fef3c7" stroke="#c39a3a" stroke-width="3"/>
  <text x="395" y="185" text-anchor="middle" font-size="24" font-family="Arial" fill="#664d17">2. Validate</text>
  <text x="395" y="220" text-anchor="middle" font-size="19" font-family="Arial" fill="#664d17">справді токсичні?</text>

  <rect x="520" y="120" width="190" height="150" rx="12" fill="#fee2e2" stroke="#cb7d7d" stroke-width="3"/>
  <text x="615" y="185" text-anchor="middle" font-size="24" font-family="Arial" fill="#7a2f2f">3. Outreach</text>
