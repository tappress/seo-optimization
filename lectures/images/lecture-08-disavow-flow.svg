  <line x1="270" y1="195" x2="300" y2="195" stroke="#64748b" stroke-width="4"/>
  <line x1="490" y1="195" x2="520" y2="195" stroke="#64748b" stroke-width="4"/>
  <line x1="710" y1="195" x2="740" y2="195" stroke="#64748b" stroke-width="4"/>
  <line x1="930" y1="195" x2="960" y2="195" stroke="#64748b" stroke-width="4"/>

  <rect x="230" y="340" width="740" height="100" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="380" text-anchor="middle" font-size="24" font-family="Arial" fill="#334155">Disavow застосовують обережно, лише після валідації ризиків</text>
  <text x="600" y="412" text-anchor="middle" font-size="20" font-family="Arial" fill="#334155">це не інструмент для "косметики" профілю</text>
