  <text x="835" y="185" text-anchor="middle" font-size="24" font-family="Arial" fill="#4a3b94">4. Disavow file</text>
  <text x="835" y="220" text-anchor="middle" font-size="19" font-family="Arial" fill="#4a3b94">domain:spamsite.tld</text>

  <rect x="960" y="120" width="170" height="150" rx="12" fill="#dcfce7" stroke="#5ea07f" stroke-width="3"/>
  <text x="1045" y="185" text-anchor="middle" font-size="24" font-family="Arial" fill="#1f5a3e">5. Monitor</text>
