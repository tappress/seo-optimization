<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .label { font: 600 24px Arial, sans-serif; fill: #111827; }
      .small { font: 500 18px Arial, sans-serif; fill: #374151; }
      .url { font: 500 20px 'Courier New', monospace; fill: #1f2937; }
      .box { fill: #f9fafb; stroke: #9ca3af; stroke-width: 2; rx: 14; }
      .main { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 14; }
      .arrow { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#m); }
      .subtle { stroke: #d1d5db; stroke-width: 1; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#ffffff"/>

  <rect x="90" y="180" width="440" height="95" class="box"/>
  <text x="115" y="230" class="url">/laptops?sort=price</text>

  <rect x="90" y="315" width="440" height="95" class="box"/>
  <text x="115" y="365" class="url">/laptops?brand=asus</text>

  <rect x="90" y="450" width="440" height="95" class="box"/>
  <text x="115" y="500" class="url">/laptops?utm_source=newsletter</text>

  <rect x="680" y="300" width="430" height="125" class="main"/>
  <text x="720" y="350" class="label">Canonical URL</text>
  <text x="720" y="388" class="url">/laptops</text>

  <path d="M540 227 C610 227, 620 315, 670 345" class="arrow"/>
  <path d="M540 362 C610 362, 620 350, 670 350" class="arrow"/>
  <path d="M540 497 C610 497, 620 390, 670 360" class="arrow"/>

  <text x="82" y="625" class="small">Rule: duplicate pages should reference one indexable, 200-status canonical page.</text>
