<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .label { font: 600 22px Arial, sans-serif; fill: #111827; }
      .small { font: 500 17px Arial, sans-serif; fill: #4b5563; }
      .good { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2.5; }
      .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; }
      .neutral { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .subtle { stroke: #d1d5db; stroke-width: 1; }
    </style>
  </defs>

  <rect x="120" y="50" width="960" height="70" class="neutral" rx="10"/>
  <text x="145" y="95" class="label">Total crawl budget = 100%</text>

  <text x="120" y="200" class="label">Before cleanup</text>
  <rect x="120" y="225" width="300" height="80" class="good" rx="10"/>
  <rect x="420" y="225" width="420" height="80" class="bad" rx="10"/>
  <rect x="840" y="225" width="240" height="80" class="neutral" rx="10"/>
  <text x="180" y="272" class="small">30% important pages</text>
  <text x="520" y="272" class="small">45% duplicate/filter URLs</text>
  <text x="885" y="272" class="small">25% redirects/errors</text>

  <text x="120" y="390" class="label">After technical optimization</text>
  <rect x="120" y="415" width="760" height="80" class="good" rx="10"/>
  <rect x="880" y="415" width="130" height="80" class="neutral" rx="10"/>
  <rect x="1010" y="415" width="70" height="80" class="bad" rx="10"/>
  <text x="430" y="462" class="small">80% important pages crawled</text>
  <text x="900" y="462" class="small">13%</text>
  <text x="1028" y="462" class="small">7%</text>
</svg>
