<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .label { font: 600 22px Arial, sans-serif; fill: #111827; }
      .small { font: 500 17px Arial, sans-serif; fill: #374151; }
      .node { fill: #f9fafb; stroke: #9ca3af; stroke-width: 2; rx: 12; }
      .ok { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2.5; rx: 12; }
      .no { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; rx: 12; }
      .arrow { stroke: #6b7280; stroke-width: 3.5; fill: none; marker-end: url(#m); }
      .subtle { stroke: #d1d5db; stroke-width: 1; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6b7280"/>
    </marker>
  </defs>


  <rect x="465" y="170" width="270" height="95" class="node"/>
  <text x="530" y="225" class="label">Googlebot</text>

  <rect x="420" y="315" width="360" height="115" class="node"/>
  <text x="460" y="362" class="label">Check robots.txt rules</text>
  <text x="460" y="395" class="small">User-agent + Allow/Disallow</text>

  <rect x="120" y="500" width="400" height="125" class="no"/>
  <text x="165" y="555" class="label">Disallow match</text>
  <text x="165" y="588" class="small">URL skipped from crawling</text>

  <rect x="680" y="500" width="400" height="125" class="ok"/>
  <text x="730" y="555" class="label">Allow match</text>
  <text x="730" y="588" class="small">URL can be crawled normally</text>

  <path d="M600 265 L600 305" class="arrow"/>
  <path d="M510 430 C470 465, 410 485, 330 500" class="arrow"/>
  <path d="M690 430 C730 465, 790 485, 870 500" class="arrow"/>
</svg>
