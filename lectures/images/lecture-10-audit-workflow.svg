<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620">
  <rect x="0" y="0" width="1200" height="620" fill="#f8fafc"/>

  <defs>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="20" y="90" width="210" height="150" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="125" y="155" text-anchor="middle" font-family="Arial" font-size="28" fill="#1e3a8a">Збір даних</text>
  <text x="125" y="195" text-anchor="middle" font-family="Arial" font-size="24" fill="#1e3a8a">GSC + GA4 + Crawl</text>

  <rect x="260" y="90" width="210" height="150" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="365" y="155" text-anchor="middle" font-family="Arial" font-size="28" fill="#14532d">Діагностика</text>
  <text x="365" y="195" text-anchor="middle" font-family="Arial" font-size="24" fill="#14532d">тех + контент + links</text>

  <rect x="500" y="90" width="210" height="150" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
  <text x="605" y="155" text-anchor="middle" font-family="Arial" font-size="28" fill="#92400e">Гіпотези</text>
  <text x="605" y="195" text-anchor="middle" font-family="Arial" font-size="24" fill="#92400e">impact estimation</text>

  <rect x="740" y="90" width="210" height="150" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="845" y="155" text-anchor="middle" font-family="Arial" font-size="28" fill="#7f1d1d">Пріоритет</text>
  <text x="845" y="195" text-anchor="middle" font-family="Arial" font-size="24" fill="#7f1d1d">impact / effort</text>

  <rect x="980" y="90" width="200" height="150" rx="18" fill="#e2e8f0" stroke="#475569" stroke-width="4"/>
  <text x="1080" y="155" text-anchor="middle" font-family="Arial" font-size="28" fill="#0f172a">Roadmap</text>
  <text x="1080" y="195" text-anchor="middle" font-family="Arial" font-size="24" fill="#0f172a">backlog + owners</text>

  <line x1="230" y1="165" x2="260" y2="165" stroke="#334155" stroke-width="6" marker-end="url(#arrow2)"/>
  <line x1="470" y1="165" x2="500" y2="165" stroke="#334155" stroke-width="6" marker-end="url(#arrow2)"/>
  <line x1="710" y1="165" x2="740" y2="165" stroke="#334155" stroke-width="6" marker-end="url(#arrow2)"/>
  <line x1="950" y1="165" x2="980" y2="165" stroke="#334155" stroke-width="6" marker-end="url(#arrow2)"/>

  <rect x="20" y="300" width="1160" height="280" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="80" y="360" font-family="Arial" font-size="28" fill="#0f172a">Deliverables аудиту:</text>
  <text x="80" y="415" font-family="Arial" font-size="26" fill="#1e3a8a">- список проблем із причиною та масштабом</text>
  <text x="80" y="460" font-family="Arial" font-size="26" fill="#14532d">- очікуваний ефект по KPI для кожної задачі</text>
  <text x="80" y="505" font-family="Arial" font-size="26" fill="#92400e">- пріоритет і складність (high / medium / low)</text>
  <text x="80" y="550" font-family="Arial" font-size="26" fill="#7f1d1d">- план впровадження на 30-90 днів</text>
